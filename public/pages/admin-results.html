<!DOCTYPE html>
<html lang="en">
  <head>

                <th>Имэйл</th>
                <th>Утас</th>

                <th>Буруу</th>
                <th>Оноо</th>
                <th>Хариулт</th>
                <th>Үргэлжлэсэн хугацаа</th>

            </thead>
            <tbody id="results-body"></tbody>
          </table>
        </div>
      </div>

    <script type="module" src="/js/admin-results.js"></script>
